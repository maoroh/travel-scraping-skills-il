name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            **/SKILL.md
            **/SKILL_HE.md
            **/metadata.json

      # The attestation above signs the files, but signed_release checks the
      # latest GitHub Release. Pushing a tag does not create one, so do it here.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
